
samples: config/samples.tsv

genome:
  fasta: data/human/GRCh38_full_analysis_set_plus_decoy_hla.fa
  species: human
  build: GRCh38
  refpanel: config/refpanel.tsv

vcf_qc:
  historic_vcf: "data/historic/historic_samples.vcf.gz"
  prune_in: "data/pruned/qc_pruning.prune.in"
  afreq: "data/pruned/ref_panel_freqs.afreq"

downsample: [0]

# refsize: [0, 100, 200, 300, 400]
refsize: [0]

chroms: ['chr1', 'chr2', 'chr3', 'chr4', 'chr5', 'chr6', 'chr7', 'chr8', 'chr9', 'chr10', 'chr11', 'chr12', 'chr13', 'chr14', 'chr15', 'chr16', 'chr17', 'chr18', 'chr19', 'chr20', 'chr21', 'chr22', 'chrX']

run_name: "corrida_20260513_1"

#'all', 'speed', 'accuracy', 'quilt1', 'quilt2', 'glimpse1',  'glimpse2'
scenario: 'quilt2'

# global programs
time: "/usr/bin/time"

## we wanna output some extra variants in buffer for ligation
extra_buffer_in_quilt: 100000
chunksize: 5000000

quilt2:
  nGen: 100
  buffer: 500000
  Ksubset: 600
  Knew: 600
  nGibbsSamples: 7
  n_seek_its: 3
  small_ref_panel_block_gibbs_iterations: c(3,6,9)
  small_ref_panel_gibbs_iterations: 20
  lowram: 'TRUE'
  impute_rare_common: 'TRUE'
  rare_af_threshold: 0.001
  mspbwtM: 1
  mspbwtL: 3
  mspbwtB: 32
  mspbwt-nindices: 4

quilt1:
  nGen: 100
  buffer: 500000
  Ksubset: 600
  Knew: 600
  nGibbsSamples: 7
  n_seek_its: 3
  small_ref_panel_block_gibbs_iterations: c(3,6,9)
  small_ref_panel_gibbs_iterations: 20
  lowram: 'TRUE'
  impute_rare_common: 'FALSE'
  rare_af_threshold: 0

glimpse2:
  buffer: 500000
  bq: 20
  mq: 20
  burnin: 5
  main: 15
  pbwt-depth: 12
  pbwt-modulo-cm: 0.1
  ne: 100000


glimpse1:
  buffer: 500000
  bq: 20
